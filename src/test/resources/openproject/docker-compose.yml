services:
  openproject:
    image: "openproject/openproject:${OPENPROJECT_IMAGE_TAG}"
    container_name: "openproject-it"
    ports:
      - "${OPENPROJECT_PORT:-8088}:80"
    environment:
      # required hostname setting in docker setups [[3]](https://www.openproject.org/docs/installation-and-operations/installation/docker/)
      OPENPROJECT_HOST__NAME: "${OPENPROJECT_HOST_NAME:-localhost}"

      # make local testing easier (no TLS) [[3]](https://www.openproject.org/docs/installation-and-operations/installation/docker/)
      OPENPROJECT_HTTPS: "false"

      # seed demo data so "Demo project" exists (works in common docker setups)
      OPENPROJECT_SEED_DUMMY_DATA: "true"

      # optional: keep email out of the way
      OPENPROJECT_EMAIL__DELIVERY__METHOD: "smtp"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost/api/v3 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
