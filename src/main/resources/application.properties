spring.application.name=spring-openproject-mcp-server
server.address=0.0.0.0

spring.cache.type=caffeine
spring.cache.cache-names=auth-validation
spring.cache.caffeine.spec=expireAfterWrite=15m

management.otlp.tracing.export.enabled=false
management.otlp.logging.export.enabled=false
management.otlp.metrics.export.enabled=false

spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=openproject-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.protocol=sse
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.type=sync
spring.ai.mcp.server.annotation-scanner.enabled=true

openproject.url=https://localhost.internal
openproject.allow-header-base-url=false

actuator.security.admin.username=admin
